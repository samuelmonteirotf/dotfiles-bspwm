# ╔══════════════════════════════════════════════════════════╗
# ║  starship.toml · NEXUS · Red Team / Crimson               ║
# ╚══════════════════════════════════════════════════════════╝

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭─](bold red)$os$git_branch
[╰─](bold red)$character"""

right_format = """$cmd_duration$jobs$time"""

add_newline = true
palette = "crimson"

# ── Paleta NEXUS Crimson ─────────────────────────────────────
[palettes.crimson]
red       = "#ff2b43"
blood     = "#8a0f1d"
coral     = "#ff5563"
amber     = "#ff9e3d"
gold      = "#ffc777"
green     = "#3fb950"
blue      = "#7a8aff"
fg        = "#d7dae0"
muted     = "#3a3f47"
selection = "#5c2731"

# ── Símbolo do prompt ────────────────────────────────────────
[character]
success_symbol = "[❯](bold red)"
error_symbol   = "[❯](bold blood)"
vimcmd_symbol  = "[❮](bold amber)"

# ── OS / distro ──────────────────────────────────────────────
[os]
disabled = false
style = "bold red"
format = "[$symbol]($style) "

[os.symbols]
CachyOS = "󰣇"
Arch  = "󰣇"
Linux = "󰌽"

# ── Usuário / host (só aparecem em SSH) ──────────────────────
[username]
style_user = "bold coral"
style_root = "bold blood"
format = "[$user]($style) "
show_always = false

[hostname]
ssh_only = true
style = "bold coral"
format = "[@$hostname]($style) "

# ── Diretório ────────────────────────────────────────────────
[directory]
style = "bold coral"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = "…/"
read_only = " "
read_only_style = "blood"
home_symbol = " ~"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Projects"  = " Projects"

# ── Git ──────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold amber"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "✖"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?${count}"
stashed    = " ${count}"
modified   = "!${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✘${count}"

[git_state]
style = "bold blood"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

# ── Linguagens / runtime ─────────────────────────────────────
[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"

[python]
symbol = " "
style = "bold gold"
format = '[$symbol($version )(\($virtualenv\) )]($style)'

[rust]
symbol = " "
style = "bold coral"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold blue"
format = "[$symbol($version )]($style)"

[docker_context]
symbol = " "
style = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = true

[package]
symbol = "󰏗 "
style = "bold muted"
format = "[$symbol$version]($style) "
disabled = false

# ── Lado direito ─────────────────────────────────────────────
[cmd_duration]
min_time = 500
style = "italic muted"
format = "[ $duration]($style) "

[jobs]
symbol = " "
style = "bold amber"
format = "[$symbol$number]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "muted"
format = "[ $time]($style)"
