[colors]
bg        = #0b0c0e
bg-alt    = #14161a
fg        = #d7dae0
fg-dim    = #6b7079
red       = #ff2b43
red-soft  = #ff5563
crimson   = #c41230
blood     = #8a0f1d
amber     = #ff9e3d
white     = #f4f6fa
ok        = #3fb950

[bar/main]
monitor       = ${env:MONITOR:}
width         = 100%
height        = 30pt
radius        = 0
bottom        = false
fixed-center  = true

background     = ${colors.bg}
foreground     = ${colors.fg}

line-size      = 3pt
border-size    = 0pt
border-color   = #00000000

padding-left   = 1
padding-right  = 1
module-margin  = 1

separator        = %{F#1d2026}│%{F-}
separator-margin = 1

font-0 = MesloLGL Nerd Font:size=10;3
font-1 = MesloLGL Nerd Font:size=14;4
font-2 = MesloLGL Nerd Font:style=Bold:size=10;3
font-3 = FantasqueSansM Nerd Font:size=11;3

modules-left   = launcher vesktop bspwm xwindow
modules-center = date
modules-right  = cpu cputemp memory gpu temperature pulseaudio network systray powermenu

cursor-click   = pointer
enable-ipc     = true

[module/launcher]
type = custom/text
format = %{T2} %{T-}
format-foreground = ${colors.red}
format-background = ${colors.bg-alt}
format-padding = 2
click-left = rofi -show drun

[module/bspwm]
type = internal/bspwm

label-focused            = %name%
label-focused-foreground = ${colors.red}
label-focused-background = ${colors.bg-alt}
label-focused-underline  = ${colors.red}
label-focused-padding    = 1

label-occupied           = %name%
label-occupied-foreground = ${colors.fg-dim}
label-occupied-padding   = 1

label-urgent             = %name%
label-urgent-foreground  = ${colors.amber}
label-urgent-padding     = 1

label-empty              = %name%
label-empty-foreground   = #2a2d34
label-empty-padding      = 1

[module/xwindow]
type = internal/xwindow
label = %{T4}%title:0:70:…%%{T-}
label-foreground = ${colors.fg-dim}
label-padding = 2

[module/date]
type = internal/date
interval = 1
date = %a %d/%m
time = %H:%M:%S
label =  %date%   %time%
label-foreground = ${colors.white}
format-prefix-foreground = ${colors.red}

[module/cpu]
type = internal/cpu
interval = 1
format-prefix = " 󰻠 "
format-prefix-foreground = ${colors.red}
label = %percentage:2%%
label-foreground = ${colors.fg}

[module/cputemp]
type = custom/script
exec = "$HOME/.config/polybar/scripts/cpu_temp.sh"
interval = 3
format-prefix = " 󰔏 "
format-prefix-foreground = ${colors.red}
label = %output%
label-foreground = ${colors.fg}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " 󰍛 "
format-prefix-foreground = ${colors.red}
label = %gb_used%
label-foreground = ${colors.fg}

[module/gpu]
type = custom/script
exec = "$HOME/.config/polybar/scripts/gpu.sh"
interval = 2
format-prefix = " 󰢮 "
format-prefix-foreground = ${colors.red}
label = %output%
label-foreground = ${colors.fg}

[module/temperature]
type = custom/script
exec = "$HOME/.config/polybar/scripts/gpu_temp.sh"
interval = 3
format-prefix = " 󰔏 "
format-prefix-foreground = ${colors.red}
label = %output%
label-foreground = ${colors.fg}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${colors.fg}
label-volume = %percentage%%
ramp-volume-0 =
ramp-volume-1 =
ramp-volume-2 =
ramp-volume-foreground = ${colors.red}
label-muted = " muted"
label-muted-foreground = ${colors.fg-dim}

[module/network]
type = custom/script
exec = "$HOME/.config/polybar/scripts/network_status.sh"
tail = true
click-left = "$HOME/.config/polybar/scripts/network_status.sh" toggle

[module/powermenu]
type = custom/text
format = %{T2}⏻ %{T-}
format-foreground = ${colors.crimson}
format-background = ${colors.bg-alt}
format-padding = 2
click-left = "$HOME/.config/polybar/scripts/powermenu.sh"

[module/vesktop]
type = custom/text
format = %{T2}󰙯 %{T-}
format-foreground = #5865f2
format-background = ${colors.bg-alt}
format-padding = 1
click-left = vesktop &

[module/systray]
type = internal/systray
systray-spacing = 8pt
systray-size = 16pt

[settings]
screenchange-reload = true
pseudo-transparency = false
